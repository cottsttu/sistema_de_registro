        <div class="app-menu-dropdown">

    </div>

        <div class="filtro-box">

            <button onclick="carregarLogs()">Atualizar Lista</button>
        </div>

        <div id="avisoCarregando">Carregando histórico completo...</div>

        <table id="tabelaLogs">
            <thead>
                <tr>

                    <th class="inline-auditoria-4">TIPO AÇÃO</th>
